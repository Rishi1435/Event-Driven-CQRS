server.port=8081

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.streams.application-id=${SPRING_KAFKA_STREAMS_APPLICATION_ID:ecommerce-analytics}
spring.kafka.streams.properties.processing.guarantee=exactly_once_v2

# Custom properties
kafka.topics.products=${KAFKA_TOPIC_PRODUCTS:product-events}
kafka.topics.orders=${KAFKA_TOPIC_ORDERS:order-events}
